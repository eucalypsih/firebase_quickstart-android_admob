# file_name: android_build.yml
# This is a basic workflow to help you get started with Actions
# Android CI and CD
name: Android Build
# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "master" branch
#  pull_request:
#    branches: ["main"]
#  push:
#    branches: ["main"]
  workflow_run:
    workflows: ["Clear Caches"]
    types:
      - completed

  workflow_dispatch:

permissions:
  actions: write

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout
        uses: actions/checkout@v6 #v4.1.1

      - name: Setup Java JDK
        uses: actions/setup-java@v5 #v4.0.0
        with:
          java-version: '17' # 17 11
          distribution: 'temurin' # 'adopt'

      # Permission Denied: If the runner cannot execute ./gradlew, you may need to fix file permissions in your repository by running git update-index --chmod=+x gradlew locally, then committing the change.
      - name: Change wrapper permissions
        run: chmod +x ./gradlew

#      - name: Build with Gradle Clean
#        run: ./gradlew clean

      # Runs a single command using the runners shell
      - name: Build with Gradle
        run: ./gradlew build # build --refresh-dependencies
#        run: ./gradlew wrapper --gradle-version=8.0 --distribution-type=bin

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AndroidCICD.apk
          path: app/build/outputs/apk/debug/app-debug.apk

